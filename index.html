<!doctype html>
<html lang="de">
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>Tischlerei Pius Maetzler</title>
	<meta name="description" content="Vertrauen in den Handwerker verschafft ein gutes Gefühl.">
	<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
	<link rel="stylesheet" href="css/style.css">
</head>
<body>
	<main>
		<section id="heroCarousel" class="carousel slide" aria-label="Bildergalerie">
			<div class="carousel-indicators" id="galleryIndicators"></div>

			<div class="carousel-inner" id="galleryInner"></div>

			<button class="carousel-control-prev" type="button" data-bs-target="#heroCarousel" data-bs-slide="prev">
				<span class="carousel-control-prev-icon" aria-hidden="true"></span>
				<span class="visually-hidden">Vorheriges Bild</span>
			</button>
			<button class="carousel-control-next" type="button" data-bs-target="#heroCarousel" data-bs-slide="next">
				<span class="carousel-control-next-icon" aria-hidden="true"></span>
				<span class="visually-hidden">Naechstes Bild</span>
			</button>
		</section>

		<section class="brand-row" aria-label="Logo und Claim">
			<img src="img/logo-tischlerei-pius-maetzler.png" alt="Logo Tischlerei Pius Maetzler">
			<p class="claim">Vertrauen in den Handwerker verschafft ein gutes Gefühl.</p>
		</section>
	</main>

	<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
	<script>
		const galleryPath = "img/gallery/";
		const supportedExtensions = ["jpg", "jpeg", "png", "webp", "gif", "avif"];

		const carouselElement = document.getElementById("heroCarousel");
		const innerElement = document.getElementById("galleryInner");
		const indicatorsElement = document.getElementById("galleryIndicators");
		const controls = carouselElement.querySelectorAll(".carousel-control-prev, .carousel-control-next");

		function encodePathSegments(path) {
			return path
				.split("/")
				.map((segment) => encodeURIComponent(segment))
				.join("/");
		}

		async function listFromDirectoryIndex() {
			try {
				const response = await fetch(galleryPath, { cache: "no-store" });
				if (!response.ok) {
					return [];
				}

				const html = await response.text();
				const doc = new DOMParser().parseFromString(html, "text/html");
				const links = Array.from(doc.querySelectorAll("a"));

				const files = links
					.map((link) => decodeURIComponent(link.getAttribute("href") || ""))
					.map((href) => href.split("?")[0].split("#")[0])
					.filter((href) => href && !href.endsWith("/") && href !== "..")
					.filter((href) => {
						const ext = href.split(".").pop();
						return ext && supportedExtensions.includes(ext.toLowerCase());
					})
					.map((href) => href.split("/").pop());

				const unique = Array.from(new Set(files));
				unique.sort((a, b) => a.localeCompare(b, undefined, { numeric: true, sensitivity: "base" }));
				return unique;
			} catch {
				return [];
			}
		}

		function imageExists(url) {
			return new Promise((resolve) => {
				const img = new Image();
				img.onload = () => resolve(true);
				img.onerror = () => resolve(false);
				img.src = `${url}?t=${Date.now()}`;
			});
		}

		async function listSequentialFallback() {
			const found = [];
			let missesInRow = 0;
			const maxMissesInRow = 12;
			const maxSequenceNumber = 400;

			for (let i = 1; i <= maxSequenceNumber && missesInRow < maxMissesInRow; i += 1) {
				const base = String(i).padStart(3, "0");
				const candidates = supportedExtensions.map((ext) => `${base}.${ext}`);

				let matched = null;
				for (const candidate of candidates) {
					const exists = await imageExists(`${galleryPath}${encodePathSegments(candidate)}`);
					if (exists) {
						matched = candidate;
						break;
					}
				}

				if (matched) {
					found.push(matched);
					missesInRow = 0;
				} else {
					missesInRow += 1;
				}
			}

			return found;
		}

		function renderCarousel(files) {
			files.forEach((file, index) => {
				const indicator = document.createElement("button");
				indicator.type = "button";
				indicator.setAttribute("data-bs-target", "#heroCarousel");
				indicator.setAttribute("data-bs-slide-to", String(index));
				indicator.setAttribute("aria-label", `Bild ${index + 1}`);
				if (index === 0) {
					indicator.classList.add("active");
					indicator.setAttribute("aria-current", "true");
				}
				indicatorsElement.appendChild(indicator);

				const item = document.createElement("div");
				item.className = `carousel-item${index === 0 ? " active" : ""}`;

				const image = document.createElement("img");
				image.className = "d-block w-100";
				image.src = `${galleryPath}${encodePathSegments(file)}`;
				image.alt = `Galeriebild ${index + 1}`;

				item.appendChild(image);
				innerElement.appendChild(item);
			});

			if (files.length < 2) {
				controls.forEach((control) => {
					control.style.display = "none";
				});
				indicatorsElement.style.display = "none";
			}

			if (window.bootstrap && files.length > 0) {
				new bootstrap.Carousel(carouselElement, {
					interval: 4200,
					pause: false,
					wrap: true,
					touch: true
				});
			}
		}

		async function initGallery() {
			const indexedFiles = await listFromDirectoryIndex();
			const files = indexedFiles.length > 0 ? indexedFiles : await listSequentialFallback();

			if (files.length === 0) {
				controls.forEach((control) => {
					control.style.display = "none";
				});
				const empty = document.createElement("div");
				empty.className = "carousel-item active";
				empty.innerHTML = '<div class="d-flex align-items-center justify-content-center h-100">Keine Bilder in img/gallery gefunden.</div>';
				innerElement.appendChild(empty);
				indicatorsElement.style.display = "none";
				return;
			}

			renderCarousel(files);
		}

		initGallery();
	</script>
</body>
</html>
