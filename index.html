<!doctype html>
<html lang="de">
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>Tischlerei Pius Maetzler</title>
	<meta name="description" content="Vertrauen in den Handwerker verschafft ein gutes Gefühl.">
	<style>
		:root {
			--bg: #f7f4ef;
			--surface: #ffffff;
			--text: #2a2926;
			--muted: #706b63;
			--accent: #9f7b52;
			--shadow: 0 10px 30px rgba(28, 22, 12, 0.15);
			--radius: 18px;
		}

		* {
			box-sizing: border-box;
		}

		body {
			margin: 0;
			font-family: "Segoe UI", "Trebuchet MS", "Helvetica Neue", sans-serif;
			color: var(--text);
			background:
				radial-gradient(1200px 480px at 20% -10%, #e4d7c6, transparent),
				radial-gradient(900px 360px at 100% 0%, #efe7db, transparent),
				var(--bg);
		}

		main {
			width: min(1100px, 92vw);
			margin: 32px auto;
			display: grid;
			gap: 28px;
		}

		.carousel {
			position: relative;
			overflow: hidden;
			border-radius: var(--radius);
			box-shadow: var(--shadow);
			background: #d8d1c6;
			min-height: min(70vh, 640px);
		}

		.slides {
			display: flex;
			height: 100%;
			transition: transform 500ms ease;
			will-change: transform;
		}

		.slide {
			min-width: 100%;
			aspect-ratio: 16 / 9;
			overflow: hidden;
		}

		.slide img {
			width: 100%;
			height: 100%;
			object-fit: cover;
			display: block;
		}

		.carousel button {
			position: absolute;
			top: 50%;
			transform: translateY(-50%);
			width: 42px;
			height: 42px;
			border: 0;
			border-radius: 50%;
			background: rgba(255, 255, 255, 0.82);
			color: #3b362f;
			font-size: 28px;
			line-height: 1;
			cursor: pointer;
			transition: background 180ms ease;
		}

		.carousel button:hover {
			background: #ffffff;
		}

		.carousel .prev {
			left: 14px;
		}

		.carousel .next {
			right: 14px;
		}

		.dots {
			position: absolute;
			left: 0;
			right: 0;
			bottom: 12px;
			display: flex;
			justify-content: center;
			gap: 8px;
		}

		.dot {
			width: 10px;
			height: 10px;
			border-radius: 50%;
			border: 0;
			background: rgba(255, 255, 255, 0.6);
			cursor: pointer;
			padding: 0;
		}

		.dot.active {
			background: var(--accent);
		}

		.brand-row {
			display: grid;
			grid-template-columns: minmax(180px, 320px) 1fr;
			align-items: center;
			gap: 24px;
			background: var(--surface);
			border-radius: var(--radius);
			padding: clamp(20px, 4vw, 34px);
			box-shadow: var(--shadow);
		}

		.brand-row img {
			width: 100%;
			height: auto;
			display: block;
			max-width: 300px;
		}

		.claim {
			margin: 0;
			font-size: clamp(1.4rem, 3.2vw, 2.4rem);
			line-height: 1.2;
			color: #3a342b;
			letter-spacing: 0.01em;
			text-wrap: balance;
		}

		@media (max-width: 760px) {
			main {
				width: min(1100px, 95vw);
			}

			.carousel {
				min-height: auto;
			}

			.brand-row {
				grid-template-columns: 1fr;
				text-align: center;
			}

			.brand-row img {
				margin-inline: auto;
			}
		}
	</style>
</head>
<body>
	<main>
		<section class="carousel" aria-label="Bildergalerie">
			<div class="slides" id="slides">
				<figure class="slide"><img src="img/gallery/001.jpg" alt="Galeriebild 1"></figure>
				<figure class="slide"><img src="img/gallery/002.jpg" alt="Galeriebild 2"></figure>
				<figure class="slide"><img src="img/gallery/003.jpg" alt="Galeriebild 3"></figure>
				<figure class="slide"><img src="img/gallery/004.jpg" alt="Galeriebild 4"></figure>
				<figure class="slide"><img src="img/gallery/005.jpg" alt="Galeriebild 5"></figure>
				<figure class="slide"><img src="img/gallery/006.jpg" alt="Galeriebild 6"></figure>
				<figure class="slide"><img src="img/gallery/007.jpg" alt="Galeriebild 7"></figure>
				<figure class="slide"><img src="img/gallery/008.jpg" alt="Galeriebild 8"></figure>
				<figure class="slide"><img src="img/gallery/009.jpg" alt="Galeriebild 9"></figure>
				<figure class="slide"><img src="img/gallery/010.jpg" alt="Galeriebild 10"></figure>
				<figure class="slide"><img src="img/gallery/011.jpg" alt="Galeriebild 11"></figure>
				<figure class="slide"><img src="img/gallery/012.jpg" alt="Galeriebild 12"></figure>
				<figure class="slide"><img src="img/gallery/013.jpg" alt="Galeriebild 13"></figure>
				<figure class="slide"><img src="img/gallery/014.jpg" alt="Galeriebild 14"></figure>
				<figure class="slide"><img src="img/gallery/015.jpg" alt="Galeriebild 15"></figure>
				<figure class="slide"><img src="img/gallery/016.jpg" alt="Galeriebild 16"></figure>
				<figure class="slide"><img src="img/gallery/017.jpg" alt="Galeriebild 17"></figure>
				<figure class="slide"><img src="img/gallery/018.jpg" alt="Galeriebild 18"></figure>
				<figure class="slide"><img src="img/gallery/019.jpg" alt="Galeriebild 19"></figure>
			</div>
			<button class="prev" id="prev" aria-label="Vorheriges Bild">&#8249;</button>
			<button class="next" id="next" aria-label="Naechstes Bild">&#8250;</button>
			<div class="dots" id="dots" aria-label="Bildauswahl"></div>
		</section>

		<section class="brand-row" aria-label="Logo und Claim">
			<img src="img/logo-tischlerei-pius-maetzler.png" alt="Logo Tischlerei Pius Maetzler">
			<p class="claim">Vertrauen in den Handwerker verschafft ein gutes Gefühl.</p>
		</section>
	</main>

	<script>
		const slides = document.getElementById("slides");
		const slideCount = slides.children.length;
		const dotsWrap = document.getElementById("dots");
		const nextButton = document.getElementById("next");
		const prevButton = document.getElementById("prev");
		let activeIndex = 0;
		let autoPlay = null;

		function renderDots() {
			for (let i = 0; i < slideCount; i += 1) {
				const dot = document.createElement("button");
				dot.className = "dot";
				dot.setAttribute("aria-label", `Bild ${i + 1}`);
				dot.addEventListener("click", () => {
					goToSlide(i);
					restartAutoPlay();
				});
				dotsWrap.appendChild(dot);
			}
		}

		function updateCarousel() {
			slides.style.transform = `translateX(-${activeIndex * 100}%)`;
			const dots = dotsWrap.children;
			for (let i = 0; i < dots.length; i += 1) {
				dots[i].classList.toggle("active", i === activeIndex);
			}
		}

		function goToSlide(index) {
			activeIndex = (index + slideCount) % slideCount;
			updateCarousel();
		}

		function startAutoPlay() {
			autoPlay = setInterval(() => {
				goToSlide(activeIndex + 1);
			}, 4200);
		}

		function restartAutoPlay() {
			clearInterval(autoPlay);
			startAutoPlay();
		}

		nextButton.addEventListener("click", () => {
			goToSlide(activeIndex + 1);
			restartAutoPlay();
		});

		prevButton.addEventListener("click", () => {
			goToSlide(activeIndex - 1);
			restartAutoPlay();
		});

		renderDots();
		updateCarousel();
		startAutoPlay();
	</script>
</body>
</html>
