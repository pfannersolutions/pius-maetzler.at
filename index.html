<!doctype html>
<html lang="de">
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>Tischlerei Pius Maetzler</title>
	<meta name="description" content="Vertrauen in den Handwerker verschafft ein gutes Gefühl.">
	<link rel="stylesheet" href="css/style.css">
</head>
<body>
	<main>
		<section class="carousel" aria-label="Bildergalerie">
			<div class="slides" id="slides">
				<figure class="slide"><img src="img/gallery/001.jpg" alt="Galeriebild 1"></figure>
				<figure class="slide"><img src="img/gallery/002.jpg" alt="Galeriebild 2"></figure>
				<figure class="slide"><img src="img/gallery/003.jpg" alt="Galeriebild 3"></figure>
				<figure class="slide"><img src="img/gallery/004.jpg" alt="Galeriebild 4"></figure>
				<figure class="slide"><img src="img/gallery/005.jpg" alt="Galeriebild 5"></figure>
				<figure class="slide"><img src="img/gallery/006.jpg" alt="Galeriebild 6"></figure>
				<figure class="slide"><img src="img/gallery/007.jpg" alt="Galeriebild 7"></figure>
				<figure class="slide"><img src="img/gallery/008.jpg" alt="Galeriebild 8"></figure>
				<figure class="slide"><img src="img/gallery/009.jpg" alt="Galeriebild 9"></figure>
				<figure class="slide"><img src="img/gallery/010.jpg" alt="Galeriebild 10"></figure>
				<figure class="slide"><img src="img/gallery/011.jpg" alt="Galeriebild 11"></figure>
				<figure class="slide"><img src="img/gallery/012.jpg" alt="Galeriebild 12"></figure>
				<figure class="slide"><img src="img/gallery/013.jpg" alt="Galeriebild 13"></figure>
				<figure class="slide"><img src="img/gallery/014.jpg" alt="Galeriebild 14"></figure>
				<figure class="slide"><img src="img/gallery/015.jpg" alt="Galeriebild 15"></figure>
				<figure class="slide"><img src="img/gallery/016.jpg" alt="Galeriebild 16"></figure>
				<figure class="slide"><img src="img/gallery/017.jpg" alt="Galeriebild 17"></figure>
				<figure class="slide"><img src="img/gallery/018.jpg" alt="Galeriebild 18"></figure>
				<figure class="slide"><img src="img/gallery/019.jpg" alt="Galeriebild 19"></figure>
			</div>
			<button class="prev" id="prev" aria-label="Vorheriges Bild">&#8249;</button>
			<button class="next" id="next" aria-label="Naechstes Bild">&#8250;</button>
			<div class="dots" id="dots" aria-label="Bildauswahl"></div>
		</section>

		<section class="brand-row" aria-label="Logo und Claim">
			<img src="img/logo-tischlerei-pius-maetzler.png" alt="Logo Tischlerei Pius Maetzler">
			<p class="claim">Vertrauen in den Handwerker verschafft ein gutes Gefühl.</p>
		</section>
	</main>

	<script>
		const slides = document.getElementById("slides");
		const slideCount = slides.children.length;
		const dotsWrap = document.getElementById("dots");
		const nextButton = document.getElementById("next");
		const prevButton = document.getElementById("prev");
		let activeIndex = 0;
		let autoPlay = null;

		function renderDots() {
			for (let i = 0; i < slideCount; i += 1) {
				const dot = document.createElement("button");
				dot.className = "dot";
				dot.setAttribute("aria-label", `Bild ${i + 1}`);
				dot.addEventListener("click", () => {
					goToSlide(i);
					restartAutoPlay();
				});
				dotsWrap.appendChild(dot);
			}
		}

		function updateCarousel() {
			slides.style.transform = `translateX(-${activeIndex * 100}%)`;
			const dots = dotsWrap.children;
			for (let i = 0; i < dots.length; i += 1) {
				dots[i].classList.toggle("active", i === activeIndex);
			}
		}

		function goToSlide(index) {
			activeIndex = (index + slideCount) % slideCount;
			updateCarousel();
		}

		function startAutoPlay() {
			autoPlay = setInterval(() => {
				goToSlide(activeIndex + 1);
			}, 4200);
		}

		function restartAutoPlay() {
			clearInterval(autoPlay);
			startAutoPlay();
		}

		nextButton.addEventListener("click", () => {
			goToSlide(activeIndex + 1);
			restartAutoPlay();
		});

		prevButton.addEventListener("click", () => {
			goToSlide(activeIndex - 1);
			restartAutoPlay();
		});

		renderDots();
		updateCarousel();
		startAutoPlay();
	</script>
</body>
</html>
